name: Aktualizacja kalendarza

on:
  workflow_dispatch:
  schedule:
    - cron: "30 13 * * *"
    - cron: "30 14 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sprawdź lokalną godzinę
        id: clock
        run: |
          hour=$(TZ=Europe/Warsaw date +%H:%M)
          if [[ "$hour" == "15:30" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.clock.outputs.run == 'true'
        with:
          python-version: "3.12"
          cache: pip
      - name: Narzędzia OCR
        if: steps.clock.outputs.run == 'true'
        run: sudo apt-get update && sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-pol
      - name: Zależności
        if: steps.clock.outputs.run == 'true'
        run: pip install -r requirements.txt pytest
      - name: Testy
        if: steps.clock.outputs.run == 'true'
        run: pytest -q
      - name: Generowanie kalendarza
        if: steps.clock.outputs.run == 'true'
        run: python generate_calendar.py
      - name: Zapis aktualizacji
        if: steps.clock.outputs.run == 'true'
        run: |
          git config user.name "rdxiii-calendar[bot]"
          git config user.email "rdxiii-calendar[bot]@users.noreply.github.com"
          git add public/komisje-rd-xiii.ics
          git diff --cached --quiet || git commit -m "Aktualizacja kalendarza"
          git push

